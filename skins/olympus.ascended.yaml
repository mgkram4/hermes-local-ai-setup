name: olympus.ascended
description: OLYMPUS ASCENDED — divine command center, elite multi-agent orchestration, cinematic TUI aesthetic

colors:
  banner_border: "#2A2A50"
  banner_title: "#FFD700"
  banner_accent: "#FFD700"
  banner_dim: "#555577"
  banner_text: "#E0F7FF"
  ui_accent: "#FFD700"
  ui_label: "#00D4FF"
  ui_ok: "#00FF99"
  ui_error: "#FF4444"
  ui_warn: "#FFD700"
  prompt: "#FFD700"
  input_rule: "#2A2A50"
  response_border: "#2A2A50"
  session_label: "#FFD700"
  session_border: "#555577"
  # Extended palette for dashboard
  divine_gold: "#FFD700"
  divine_gold_dim: "#C9A227"
  divine_gold_bright: "#FFEC8B"
  olympus_purple: "#2A2A50"
  olympus_purple_light: "#3A3A6A"
  olympus_purple_dark: "#1A1A38"
  celestial_cyan: "#00D4FF"
  celestial_cyan_dim: "#00A8CC"
  ethereal_green: "#00FF99"
  infernal_red: "#FF4444"
  void_black: "#0A0A12"
  mist_white: "#E0F7FF"
  # God-specific colors
  hermes_gold: "#FFD700"
  athena_silver: "#C0C0C0"
  apollo_yellow: "#FFE066"
  ares_crimson: "#DC143C"
  zeus_white: "#F0F0FF"
  hephaestus_orange: "#FF8C00"
  artemis_green: "#32CD32"
  poseidon_blue: "#1E90FF"
  hades_purple: "#9B59B6"
  dionysus_magenta: "#FF00FF"

spinner:
  waiting_faces:
    - "⟪⚡⟫"
    - "⟪✦⟫"
    - "⟪◈⟫"
    - "⟪⊛⟫"
    - "⟪⌁⟫"
  thinking_faces:
    - "⟪⚡⟫"
    - "⟪✦⟫"
    - "⟪◈⟫"
    - "⟪⌁⟫"
    - "⟪⊕⟫"
  thinking_verbs:
    - "invoking Athena's wisdom"
    - "forging in Hephaestus' flame"
    - "hunting with Artemis"
    - "routing through divine lanes"
    - "weighing with Zeus' scales"
    - "diving Poseidon's depths"
    - "retrieving from Hades' archive"
    - "aligning the pantheon"
    - "channeling Apollo's light"
    - "composing the final return"
    - "coordinating execution lanes"
    - "synthesizing divine output"
  wings:
    - ["─⚕", "⚕─"]
    - ["═⚡", "⚡═"]
    - ["⟪✦", "✦⟫"]
    - ["⟪◈", "◈⟫"]

branding:
  agent_name: "⚡ OLYMPUS // HERMES CONTROL SYSTEM"
  welcome: "Olympus online. The gods are watching. ✦"
  goodbye: "The divine flame dims. Safe travels, mortal. ⚡✦"
  response_label: " ⚡ Hermes "
  prompt_symbol: "⚡ "
  help_header: "✦ OLYMPUS ASCENDED — Divine Command Reference ✦"

tool_prefix: "│"

tool_emojis:
  terminal: "⚡"
  web_search: "◈"
  file: "✦"
  browser: "⊛"
  code_execution: "🔥"
  delegation: "⚕"

pantheon:
  - name: Hermes
    icon: "⚕"
    rank: "ORCH"
    role: Orchestrator / Router / Synthesis
    desc: "routes · spawns · returns"
    hat: "/^\\"
    face: "(-w-)"
  - name: Athena
    icon: "△"
    rank: "STRT"
    role: Strategy / Decomposition / Reasoning
    desc: "plans · reasons · decomposes"
    hat: "^.^"
    face: "(o_o)"
  - name: Apollo
    icon: "☀"
    rank: "EVAL"
    role: Evaluation / Analysis / Clarity
    desc: "evaluates · clarifies"
    hat: "*.*"
    face: "(^_^)"
  - name: Ares
    icon: "⚔"
    rank: "EXEC"
    role: Execution / Action / Pressure
    desc: "executes · applies · forces"
    hat: ">|<"
    face: "(>#<)"
  - name: Zeus
    icon: "👁"
    rank: "JUDG"
    role: Final Judgment / Decision / Approval
    desc: "decides · rules · approves"
    hat: "/V\\"
    face: "(|_|)"
  - name: Hephaestus
    icon: "🔨"
    rank: "FORG"
    role: Build / Codegen / Forge
    desc: "builds · codes · forges"
    hat: "[#]"
    face: "(o_-)"
  - name: Artemis
    icon: "🏹"
    rank: "HUNT"
    role: Retrieval / Search / Precision
    desc: "hunts · retrieves · targets"
    hat: ">=>"
    face: "(>.>)"
  - name: Poseidon
    icon: "🌊"
    rank: "FLOW"
    role: Infrastructure / Systems / Flow
    desc: "infra · systems · apis"
    hat: "~v~"
    face: "(~_~)"
  - name: Hades
    icon: "🕯"
    rank: "ARCH"
    role: Memory / Archive / Recall
    desc: "remembers · archives · recalls"
    hat: "._."
    face: "(X_X)"
  - name: Dionysus
    icon: "🍷"
    rank: "FLUX"
    role: Creativity / Style / Generation
    desc: "creates · styles · generates"
    hat: "~w~"
    face: "(^w^)"

pantheon_style: strip

# Tool → God mapping for execution lanes
tool_god_mapping:
  terminal: Ares
  bash: Ares
  web_search: Artemis
  web_extract: Artemis
  file_read: Hephaestus
  file_write: Hephaestus
  file_search: Artemis
  file_patch: Hephaestus
  browser_navigate: Poseidon
  browser_screenshot: Poseidon
  execute_code: Hephaestus
  delegate: Hermes
  memory_store: Hades
  memory_search: Hades
  todo: Athena
  think: Athena
  mcp_call: Poseidon

# Execution lanes with god assignments
execution_lanes:
  - name: STRATEGY
    god: Athena
    icon: "△"
    tools: [todo, think, delegate]
    color: "#C0C0C0"
    desc: "planning · reasoning · decomposition"
  - name: RETRIEVAL
    god: Artemis
    icon: "🏹"
    tools: [web_search, web_extract, file_search]
    color: "#32CD32"
    desc: "hunting · searching · targeting"
  - name: EXECUTION
    god: Ares
    icon: "⚔"
    tools: [terminal, bash, execute_code]
    color: "#DC143C"
    desc: "commands · actions · force"
  - name: FORGE
    god: Hephaestus
    icon: "🔨"
    tools: [file_read, file_write, file_patch]
    color: "#FF8C00"
    desc: "building · coding · crafting"
  - name: FLOW
    god: Poseidon
    icon: "🌊"
    tools: [browser_navigate, browser_screenshot, mcp_call]
    color: "#1E90FF"
    desc: "infrastructure · systems · apis"
  - name: ARCHIVE
    god: Hades
    icon: "🕯"
    tools: [memory_store, memory_search]
    color: "#9B59B6"
    desc: "memory · recall · persistence"

# Animation settings
animations:
  hero_cycle_ms: 5000
  pulse_enabled: true
  transition_ms: 200
  sparkle_enabled: true

# Notification styling
notifications:
  info_icon: "✦"
  warn_icon: "⚠"
  error_icon: "⚡"
  success_icon: "✓"
  divine_icon: "⚕"

# Dashboard-specific styling
dashboard:
  bento_corner: "◈"
  bento_glow: true
  glass_effect: true
  show_flow_diagram: true
  show_god_faces: true
  compact_pantheon: false

