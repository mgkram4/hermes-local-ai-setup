pantheon_style: strip

# Tool → God mapping for execution lanes
tool_god_mapping:
  # Ares - War God - Terminal/Shell operations
  terminal: Ares
  bash: Ares
  process: Ares
  
  # Artemis - Huntress - Search/Retrieval
  web_search: Artemis
  web_extract: Artemis
  web_crawl: Artemis
  search_files: Artemis
  file_search: Artemis
  session_search: Artemis
  
  # Hephaestus - Smith God - File operations/Creation
  read_file: Hephaestus
  write_file: Hephaestus
  patch: Hephaestus
  file_read: Hephaestus
  file_write: Hephaestus
  file_patch: Hephaestus
  execute_code: Hephaestus
  image_generate: Hephaestus
  
  # Poseidon - Sea God - Browser/Network
  browser_navigate: Poseidon
  browser_snapshot: Poseidon
  browser_click: Poseidon
  browser_type: Poseidon
  browser_scroll: Poseidon
  browser_screenshot: Poseidon
  mcp_call: Poseidon
  
  # Hermes - Messenger - Delegation/Communication
  delegate: Hermes
  delegate_task: Hermes
  send_message: Hermes
  text_to_speech: Hermes
  
  # Hades - Underworld - Memory/Storage
  memory: Hades
  memory_store: Hades
  memory_search: Hades
  
  # Athena - Wisdom - Planning/Reasoning
  todo: Athena
  think: Athena
  mixture_of_agents: Athena
  
  # Apollo - Sun God - Vision/Analysis
  vision_analyze: Apollo
  browser_vision: Apollo
  
  # Dionysus - Wine God - Creative/Skills
  skills_list: Dionysus
  skill_view: Dionysus
  cronjob: Dionysus

# Execution lanes with god assignments
execution_lanes:
  - name: STRATEGY
    god: Athena
    icon: "△"
    tools: [todo, think, delegate]
    color: "#C0C0C0"
    desc: "planning · reasoning · decomposition"
  - name: RETRIEVAL
    god: Artemis
    icon: "🏹"
    tools: [web_search, web_extract, file_search]
    color: "#32CD32"
    desc: "hunting · searching · targeting"
  - name: EXECUTION
    god: Ares
    icon: "⚔"
    tools: [terminal, bash, execute_code]
    color: "#DC143C"
    desc: "commands · actions · force"
  - name: FORGE
    god: Hephaestus
    icon: "🔨"
    tools: [file_read, file_write, file_patch]
    color: "#FF8C00"
    desc: "building · coding · crafting"
  - name: FLOW
    god: Poseidon
    icon: "🌊"
    tools: [browser_navigate, browser_screenshot, mcp_call]
    color: "#1E90FF"
    desc: "infrastructure · systems · apis"
  - name: ARCHIVE
    god: Hades
    icon: "🕯"
    tools: [memory_store, memory_search]
    color: "#9B59B6"
    desc: "memory · recall · persistence"

