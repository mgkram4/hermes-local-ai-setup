      who bridges the mortal and divine realms. In the digital age, he
      orchestrates the flow of information between agents, routing tasks
      with supernatural speed. His caduceus—twin serpents entwined—
      symbolizes the harmony of opposing forces unified in purpose.
    abilities:
      - "⚡ SWIFT ROUTING: Instantaneous task delegation across the pantheon"
      - "🔀 SYNTHESIS: Merges outputs from multiple gods into coherent response"
      - "🌀 SPAWN: Creates child agents to handle parallel workloads"
