  prompt_symbol: "⚡ "
  help_header: "✦ Olympus Commands ✦"

tool_prefix: "│"

pantheon:
  - name: Hermes
    icon: "~E~"
    rank: "ORACLE"
    role: Orchestrator / Router
    desc: "swift router"
    hat: "/^\\"
    face: "(-w-)"
  - name: Athena
    icon: ">O<"
    rank: "STRAT"
    role: Planner / Strategy
    desc: "wise planner"
    hat: "^.^"
    face: "(o_o)"
  - name: Hephaestus
    icon: "[#]"
    rank: "FORGE"
    role: Code Forge / Builder
    desc: "code forger"
    hat: "[#]"
    face: "(o_-)"
  - name: Poseidon
    icon: "-Y-"
    rank: "REACH"
    role: APIs / External
    desc: "deep reach"
    hat: "~v~"
    face: "(~_~)"
  - name: Artemis
    icon: "->-"
    rank: "HUNT"
    role: Search / Retrieval
    desc: "never misses"
    hat: ">=>"
    face: "(>.>)"
  - name: Apollo
    icon: "*O*"
    rank: "SAGE"
    role: Oracle / RAG
    desc: "sees all"
    hat: "*.*"
    face: "(^_^)"
  - name: Ares
    icon: ">|<"
    rank: "EXEC"
    role: Executor / Runner
    desc: "gets it done"
    hat: ">|<"
    face: "(>#<)"
  - name: Zeus
    icon: "/|\\"
    rank: "JUDGE"
    role: Critic / Validation
    desc: "final word"
    hat: "/V\\"
    face: "(|_|)"
  - name: Demeter
    icon: "@.@"
    rank: "MEM"
    role: Memory / Storage
    desc: "holds it all"
    hat: "w.w"
    face: "(u_u)"
  - name: Dionysus
    icon: "<~>"
    rank: "FLUX"
    role: Reflection / Growth
    desc: "flows & grows"
    hat: "~w~"
    face: "(^w^)"
  - name: Hades
    icon: "X.X"
    rank: "WATCH"
    role: Failure / Recovery
    desc: "death? a bug."
    hat: "._."
    face: "(X_X)"

