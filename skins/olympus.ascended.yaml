  - name: Zeus
    icon: "👁"
    rank: "JUDG"
    role: Final Judgment / Decision / Approval
    desc: "decides · rules · approves"
    hat: "/V\\"
    face: "(|_|)"
    color: "#F0F0FF"
    title: "King of the Gods"
    domain: "Sky, Thunder, Justice, Order"
    lore: |
      Zeus sits upon his throne on Mount Olympus, wielding thunderbolts
      forged by Hephaestus. As king of the gods, he renders final judgment
      on all matters of consequence. His word is law; his approval grants
      passage. When dangerous commands require authorization, Zeus alone
      decides whether to proceed.
    abilities:
      - "⚡ JUDGMENT: Renders final decisions on critical operations"
      - "👁 OVERSIGHT: Monitors all agent activities from above"
      - "🛡️ APPROVAL: Authorizes dangerous or irreversible actions"
    quotes:
      - "With great power comes the weight of judgment."
      - "The thunderbolt strikes where justice demands."
      - "I have spoken. Let it be done."
